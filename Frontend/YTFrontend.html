<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LibreWatch</title>
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  <style>
    body { font-family: sans-serif; background: #111; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 2rem; }
    .player-container { width: 640px; max-width: 95vw; margin-top: 1rem; border-radius: 8px; overflow: hidden; }
    input, button { padding: .5rem; margin: .25rem; font-size: 1rem; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; }
    button { background: #dc2626; cursor: pointer; border: none; font-weight: bold; }
    button:hover { background: #b91c1c; }
  </style>
</head>
<body>

<h1>LibreWatch</h1>
<div>
  <input id="videoInput" value="dQw4w9WgXcQ">
  <button id="loadBtn">Load</button>
</div>

<div class="player-container">
  <div id="player" data-plyr-provider="youtube" data-plyr-embed-id="dQw4w9WgXcQ"></div>
</div>

<script type="module">
  "use strict";

  import { extractVideoID } from '../Player/extract.js';
  import { LibreWatchPlayer } from '../Player/youtubePlayer.js';

  const btn = document.getElementById('loadBtn');
  const input = document.getElementById('videoInput');

  // Handle initialization cleanly inside an async block to prevent forced layout shifts
  async function startApp() {
    try {
      const playerInstance = await LibreWatchPlayer.init('#player');
      
      btn.addEventListener('click', () => {
        const raw = input.value.trim();
        const id = extractVideoID(raw);
        if (!id) return alert('Invalid video ID or URL');
        
        LibreWatchPlayer.load(id);
      });
    } catch (err) {
      console.error("Initialization failed:", err);
    }
  }

  // Fire only when DOM is completely parsed to stop layout thrashing
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', startApp);
  } else {
    startApp();
  }
</script>

</body>
</html>
